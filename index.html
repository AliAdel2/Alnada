<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warchat Pro - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --glass: rgba(255,255,255,0.05); --neon: #58a6ff; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #c9d1d9; }
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; transition: 0.3s; text-decoration: none; color: inherit; display: block; height: 100%; }
        .glass-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); border-color: var(--neon); }
        .stat-val { font-size: 1.6rem; font-weight: 700; color: var(--neon); }
        .menu-icon { font-size: 1.8rem; margin-bottom: 10px; color: var(--neon); }
        .table-glass { background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .table { color: #c9d1d9; margin-bottom: 0; }
        .table thead { background: rgba(255,255,255,0.05); }
        .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .badge-low { background: rgba(248, 81, 73, 0.2); color: #f85149; border: 1px solid #f85149; }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="text-center mb-4">
        <h4 class="fw-bold mb-0 text-white">Al-Nada PRO</h4>
        <small class="opacity-50">نظام الإدارة المتكامل | أهلاً حمادة خالد</small>
    </header>

    <div class="row g-3 mb-4 text-center">
        <div class="col-6 col-md-3">
            <div class="glass-card">
                <small class="opacity-50">مبيعات اليوم</small>
                <div class="stat-val" id="todaySales">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="glass-card">
                <small class="opacity-50">فواتير اليوم</small>
                <div class="stat-val" id="todayInvoices">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="glass-card">
                <small class="opacity-50">مديونيات العملاء</small>
                <div class="stat-val text-danger" id="totalDebts">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="glass-card">
                <small class="opacity-50">تحصيلات اليوم</small>
                <div class="stat-val text-success" id="todayPayments">0</div>
            </div>
        </div>
    </div>

    <h6 class="section-title opacity-75"><i class="fas fa-th-large text-primary"></i> القائمة السريعة</h6>
    <div class="row g-3 mb-5">
        <div class="col-4 col-md-4">
            <a href="pos6.html" class="glass-card text-center">
                <i class="fas fa-plus-circle menu-icon"></i>
                <div class="fw-bold small">فاتورة جديدة</div>
            </a>
        </div>
        <div class="col-4 col-md-4">
            <a href="inventory.html" class="glass-card text-center">
                <i class="fas fa-boxes menu-icon text-warning"></i>
                <div class="fw-bold small">إدارة المخزن</div>
            </a>
        </div>
        <div class="col-4 col-md-4">
            <a href="customer_ledger.html" class="glass-card text-center">
                <i class="fas fa-users-cog menu-icon text-success"></i>
                <div class="fw-bold small">كشف الحساب</div>
            </a>
        </div>
        <div class="col-4 col-md-4">
            <a href="invoices_log.html" class="glass-card text-center">
                <i class="fas fa-history menu-icon text-info"></i>
                <div class="fw-bold small">سجل الفواتير</div>
            </a>
        </div>
        <div class="col-4 col-md-4">
            <a href="#" class="glass-card text-center opacity-50">
                <i class="fas fa-chart-line menu-icon"></i>
                <div class="fw-bold small">التقارير</div>
            </a>
        </div>
        <div class="col-4 col-md-4">
            <a href="#" onclick="location.reload()" class="glass-card text-center text-secondary">
                <i class="fas fa-sync menu-icon"></i>
                <div class="fw-bold small">تحديث</div>
            </a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <h6 class="section-title"><i class="fas fa-exclamation-triangle text-danger"></i> أصناف قاربت على النفاد</h6>
            <div class="table-glass">
                <table class="table table-dark table-hover small">
                    <thead>
                        <tr>
                            <th>الصنف</th>
                            <th>المتبقي</th>
                        </tr>
                    </thead>
                    <tbody id="lowStockTable">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-6">
            <h6 class="section-title"><i class="fas fa-shopping-cart text-success"></i> أحدث العمليات</h6>
            <div class="table-glass">
                <table class="table table-dark table-hover small">
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>المبلغ</th>
                        </tr>
                    </thead>
                    <tbody id="recentSalesTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBUcS0TU4hE2pybNJTajWYRI0G0z-cKqdM",
  authDomain: "hamadaapp-e9fe0.firebaseapp.com",
  projectId: "hamadaapp-e9fe0",
  storageBucket: "hamadaapp-e9fe0.firebasestorage.app",
  messagingSenderId: "769531497692",
  appId: "1:769531497692:web:99a0f755c8b5336b6e7819",
  measurementId: "G-VE59WL203K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadDashboard() {
        const today = new Date().toLocaleDateString('en-US');
        let sales = 0, count = 0, payments = 0, totalDebts = 0;

        // 1. المبيعات والفواتير
        const invSnap = await getDocs(collection(db, "invoices"));
        const recentSalesList = [];
        
        invSnap.forEach(doc => {
            const d = doc.data();
            const date = d.timestamp?.toDate().toLocaleDateString('en-US');
            const total = parseFloat(d.total) || 0;
            const paid = parseFloat(d.paid) || 0;

            if(date === today) {
                sales += total;
                count++;
            }
            totalDebts += (total - paid);
            recentSalesList.push({ name: d.customer.name, total: total, date: d.timestamp?.toDate() });
        });

        // ترتيب وعرض أحدث 5 مبيعات
        recentSalesList.sort((a,b) => b.date - a.date);
        const recentBody = document.getElementById('recentSalesTable');
        recentSalesList.slice(0, 5).forEach(s => {
            recentBody.innerHTML += `<tr><td>${s.name}</td><td class="text-success fw-bold">${s.total.toLocaleString()}</td></tr>`;
        });

        // 2. التحصيلات الخارجية
        const paySnap = await getDocs(collection(db, "payments"));
        paySnap.forEach(doc => {
            const d = doc.data();
            const date = d.timestamp?.toDate().toLocaleDateString('en-US');
            if(date === today) payments += (parseFloat(d.amount) || 0);
            totalDebts -= (parseFloat(d.amount) || 0);
        });

        // 3. المخزن (المنتجات الناقصة)
        const stockSnap = await getDocs(collection(db, "inventory"));
        const lowStockBody = document.getElementById('lowStockTable');
        stockSnap.forEach(doc => {
            const d = doc.data();
            if(d.qty <= d.min) {
                lowStockBody.innerHTML += `<tr><td>${d.name}</td><td><span class="badge badge-low">${d.qty}</span></td></tr>`;
            }
        });

        // تحديث العدادات
        document.getElementById('todaySales').innerText = sales.toLocaleString();
        document.getElementById('todayInvoices').innerText = count;
        document.getElementById('todayPayments').innerText = payments.toLocaleString();
        document.getElementById('totalDebts').innerText = totalDebts < 0 ? 0 : totalDebts.toLocaleString();
    }

    loadDashboard();
</script>
</body>
</html>
