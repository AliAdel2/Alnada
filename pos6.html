<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warchat Pro - نظام الإدارة المتكامل</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0d1117;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #58a6ff;
            --danger-red: #ff4d4d;
            --modal-bg: rgba(22, 27, 34, 0.98);
        }

        body { 
            background: var(--bg-dark); 
            font-family: 'Cairo', sans-serif; 
            color: #c9d1d9; 
            padding-bottom: 120px; 
            overflow-x: hidden;
        }

        .header-card { position: relative; z-index: 1050; }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 12px; 
            position: relative;
        }
        
        .form-control { 
            background: rgba(0, 0, 0, 0.3) !important; 
            border: 1px solid var(--glass-border) !important; 
            color: #fff !important; 
            border-radius: 10px; 
            font-size: 0.9rem; 
        }

        .form-control:focus { 
            border-color: var(--neon-blue) !important; 
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.2); 
        }

        .log-item { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 12px 5px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .item-time { font-size: 0.65rem; color: #8b949e; display: block; }
        .item-price { font-weight: 700; color: var(--neon-blue); }

        .search-results { 
            max-height: 250px; 
            overflow-y: auto; 
            background: #1c2128; 
            border: 1px solid var(--neon-blue); 
            border-radius: 10px; 
            margin-top: 5px; 
            position: absolute; 
            width: 100%; 
            right: 0;
            z-index: 9999 !important; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-item { 
            padding: 12px; 
            cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            transition: 0.2s; 
            display: flex;
            justify-content: space-between;
        }

        .search-item:hover { background: var(--neon-blue); color: #fff; }

        .modal-content { 
            background: var(--modal-bg); 
            border: 1px solid var(--neon-blue); 
            border-radius: 20px; 
            backdrop-filter: blur(20px); 
        }

        .fixed-actions { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            padding: 15px; 
            background: rgba(13, 17, 23, 0.9); 
            border-top: 1px solid var(--glass-border); 
            z-index: 1000; 
        }

        @media print {
            @page { margin: 0; size: auto; }
            body { background: white !important; color: black !important; padding: 20px; margin: 0 !important; }
            .fixed-actions, .btn, #toggleBtn, .fas.fa-trash, .btn-close, .fa-times-circle, #cloudStatus { display: none !important; }
            .glass-card { 
                background: transparent !important; 
                border: 1px solid #eee !important; 
                color: black !important; 
                backdrop-filter: none !important; 
                box-shadow: none !important;
                margin-bottom: 10px !important;
            }
            .form-control { 
                background: transparent !important; 
                color: black !important; 
                border: none !important; 
                padding: 0 !important;
                text-align: center !important;
            }
            .text-info, .text-white, .item-price, .fw-bold, h5, h6 { color: black !important; }
            .alert-info { background: #f8f9fa !important; border: 1px solid #ddd !important; }
            #custSearchInput, #pSearch { display: none !important; }
            #selectedCustomer { display: flex !important; visibility: visible !important; }
            #mainLog .log-item { border-bottom: 1px solid #eee !important; }
        }
    </style>
</head>
<body>

<div class="container-fluid py-3">
    <header class="text-center mb-3">
        <h5 class="fw-bold text-white mb-0">فاتورة صيانة جارية</h5>
        <small id="cloudStatus" class="text-secondary opacity-50 text-uppercase" style="font-size: 10px;">Stock Sync Active</small>
    </header>

    <div class="glass-card header-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="m-0 small text-secondary"><i class="fas fa-user-circle me-1 text-info"></i> بيانات العميل</h6>
            <span class="text-info small" style="cursor:pointer; text-decoration: underline;" id="toggleBtn" onclick="toggleCustMode()">تسجيل عميل جديد</span>
        </div>

        <div id="searchMode" class="position-relative">
            <input type="text" id="custSearchInput" class="form-control" placeholder="ابحث باسم العميل أو الموبايل..." oninput="handleCustomerSearch()" autocomplete="off">
            <div id="custResults" class="search-results d-none"></div>
            
            <div id="selectedCustomer" class="mt-2 d-none alert alert-info py-2 px-3 border-0 bg-primary bg-opacity-10 d-flex justify-content-between align-items-center">
                <div>
                    <i class="fas fa-check-circle me-1"></i>
                    <span id="displayCustName" class="fw-bold small text-white"></span>
                </div>
                <i class="fas fa-times-circle text-danger" style="cursor:pointer" onclick="clearCustomer()"></i>
            </div>
        </div>

        <div id="newMode" class="d-none mt-2">
            <input type="text" id="nName" class="form-control mb-2" placeholder="الاسم بالكامل">
            <div class="row g-2">
                <div class="col-6"><input type="tel" id="nPhone" class="form-control" placeholder="رقم الموبايل"></div>
                <div class="col-6"><input type="text" id="nAddress" class="form-control" placeholder="العنوان"></div>
            </div>
        </div>
    </div>

    <div class="row g-2 mb-3 text-center">
        <div class="col-4">
            <div class="glass-card p-2 border-0 bg-info bg-opacity-10">
                <small class="text-secondary d-block" style="font-size: 0.6rem;">الإجمالي</small>
                <span class="fw-bold text-info" id="totalVal">0</span>
            </div>
        </div>
        <div class="col-4">
            <div class="glass-card p-2 border-0 bg-white bg-opacity-10">
                <small class="text-secondary d-block" style="font-size: 0.6rem;">المدفوع</small>
                <input type="number" id="pAmount" class="form-control form-control-sm text-center border-0 p-0 fw-bold bg-transparent shadow-none" value="0" oninput="doCalc()">
            </div>
        </div>
        <div class="col-4">
            <div class="glass-card p-2 border-0 bg-danger bg-opacity-10">
                <small class="text-secondary d-block" style="font-size: 0.6rem;">المتبقي</small>
                <span class="fw-bold text-danger" id="balVal">0</span>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="m-0 small fw-bold">القطع والخدمات المضافة</h6>
            <button class="btn btn-info btn-sm rounded-pill px-3" onclick="openAddModal()">
                <i class="fas fa-plus me-1"></i> إضافة
            </button>
        </div>
        <div id="mainLog"></div>
    </div>
</div>

<div class="fixed-actions">
    <div class="row g-2">
        <div class="col-6"><button id="btnDraft" class="btn btn-dark w-100 py-2 border-secondary small" onclick="handleCloudAction('draft')">حفظ سحابي</button></div>
        <div class="col-6"><button id="btnFinal" class="btn btn-success w-100 py-2 fw-bold" onclick="handleCloudAction('final')">تقفيل وطباعة</button></div>
    </div>
</div>

<div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h6 class="modal-title text-info fw-bold">إضافة للمسحوبات</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-2 position-relative">
                <input type="text" id="pSearch" class="form-control mb-2" placeholder="ابحث في المخزن..." oninput="handlePartSearch()" autocomplete="off">
                <div id="pResults" class="search-results d-none"></div>
                <div class="text-center my-3 opacity-50 small">أو إضافة خدمة يدوية</div>
                <input type="text" id="mName" class="form-control mb-2" placeholder="اسم الخدمة/المصنعية">
                <input type="number" id="mPrice" class="form-control" placeholder="السعر">
                <button class="btn btn-info w-100 mt-3 fw-bold py-2" onclick="addManual()">تأكيد الإضافة</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBUcS0TU4hE2pybNJTajWYRI0G0z-cKqdM",
  authDomain: "hamadaapp-e9fe0.firebaseapp.com",
  projectId: "hamadaapp-e9fe0",
  storageBucket: "hamadaapp-e9fe0.firebasestorage.app",
  messagingSenderId: "769531497692",
  appId: "1:769531497692:web:99a0f755c8b5336b6e7819",
  measurementId: "G-VE59WL203K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let itemsList = [];
    let isNew = false;
    let inventoryList = [];

    // تحميل المخزن للبحث السريع
    async function syncInventory() {
        const snap = await getDocs(collection(db, "inventory"));
        inventoryList = [];
        snap.forEach(d => inventoryList.push({id: d.id, ...d.data()}));
    }
    syncInventory();

    window.handlePartSearch = function() {
        const q = document.getElementById('pSearch').value.toLowerCase();
        const res = document.getElementById('pResults');
        if(q.length < 1) { res.classList.add('d-none'); return; }
        
        const filtered = inventoryList.filter(p => p.name.toLowerCase().includes(q));
        res.innerHTML = '';
        if(filtered.length > 0) {
            res.classList.remove('d-none');
            filtered.forEach(p => {
                const d = document.createElement('div');
                d.className = 'search-item';
                d.innerHTML = `
                    <div>
                        <div class="fw-bold">${p.name}</div>
                        <small class="text-secondary">المتاح: ${p.qty}</small>
                    </div>
                    <span class="text-info fw-bold">${p.sell} EGP</span>`;
                d.onclick = () => { 
                    if(p.qty > 0) {
                        addItemToTable(p.name, p.sell, p.id); 
                        closeAddModal(); 
                    } else {
                        alert("عذراً، هذا الصنف نفذ من المخزن!");
                    }
                };
                res.appendChild(d);
            });
        }
    };

    window.handleCloudAction = async function(type) {
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        const btn = type === 'draft' ? document.getElementById('btnDraft') : document.getElementById('btnFinal');
        const originalText = btn.innerText;
        let cName, cPhone;

        if(isNew) {
            cName = document.getElementById('nName').value;
            cPhone = document.getElementById('nPhone').value;
            if(!cName || !cPhone) { alert("بيانات العميل ناقصة"); return; }
            await addDoc(collection(db, "customers"), { name: cName, phone: cPhone, address: document.getElementById('nAddress').value });
        } else {
            const displayTxt = document.getElementById('displayCustName').innerText;
            if(!displayTxt) { alert("حدد العميل أولاً"); return; }
            cName = displayTxt.split(' (')[0];
            cPhone = displayTxt.split(' (')[1]?.replace(')', '') || '';
        }

        if(itemsList.length === 0) { alert("أضف خدمة واحدة على الأقل"); return; }

        try {
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            btn.disabled = true;

            // إذا كان التقفيل نهائي، نقوم بخصم المخزون
            if(type === 'final') {
                for(let item of itemsList) {
                    if(item.stockId) { // لو الصنف جاي من المخزن
                        const stockRef = doc(db, "inventory", item.stockId);
                        await updateDoc(stockRef, {
                            qty: increment(-1) // خصم قطعة واحدة
                        });
                    }
                }
            }

            const invoiceData = {
                customer: { name: cName, phone: cPhone },
                items: itemsList,
                total: parseFloat(document.getElementById('totalVal').innerText),
                paid: parseFloat(document.getElementById('pAmount').value) || 0,
                status: type,
                timestamp: serverTimestamp()
            };

            if(editId) {
                await updateDoc(doc(db, "invoices", editId), invoiceData);
            } else {
                await addDoc(collection(db, "invoices"), invoiceData);
            }

            if(type === 'final') {
                setTimeout(() => { window.print(); window.location.href = 'invoices_log.html'; }, 800);
            } else {
                alert("تم الحفظ بنجاح ✅");
                window.location.href = 'invoices_log.html';
            }
        } catch (e) { 
            console.error(e);
            alert("خطأ في الاتصال أو تحديث المخزن!"); 
        }
        finally { btn.innerText = originalText; btn.disabled = false; }
    };

    window.addItemToTable = function(name, price, stockId = null) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('ar-EG');
        const timeStr = now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
        itemsList.push({ 
            id: Date.now(), 
            name, 
            price, 
            stockId, // لحفظ مرجع الصنف في المخزن للخصم لاحقاً
            time: `${dateStr} | ${timeStr}` 
        });
        updateUI();
    };

    // باقي الدوال المساعدة
    window.toggleCustMode = function() {
        isNew = !isNew;
        document.getElementById('searchMode').classList.toggle('d-none', isNew);
        document.getElementById('newMode').classList.toggle('d-none', !isNew);
        document.getElementById('toggleBtn').innerText = isNew ? "الرجوع للبحث" : "تسجيل عميل جديد";
        if(!isNew) clearCustomer();
    };

    window.handleCustomerSearch = async function() {
        const qStr = document.getElementById('custSearchInput').value.trim().toLowerCase();
        const resDiv = document.getElementById('custResults');
        if(qStr.length < 1) { resDiv.classList.add('d-none'); return; }
        try {
            const querySnapshot = await getDocs(collection(db, "customers"));
            resDiv.innerHTML = '';
            let found = false;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if(data.name.toLowerCase().includes(qStr) || (data.phone && data.phone.includes(qStr))) {
                    found = true;
                    resDiv.classList.remove('d-none');
                    const d = document.createElement('div');
                    d.className = 'search-item';
                    d.innerHTML = `<i class="fas fa-user text-info me-2"></i> ${data.name} - ${data.phone}`;
                    d.onclick = () => { selectCustomer(data.name, data.phone); resDiv.classList.add('d-none'); };
                    resDiv.appendChild(d);
                }
            });
            if(!found) resDiv.classList.add('d-none');
        } catch(e) { console.error(e); }
    };

    window.selectCustomer = (name, phone) => {
        document.getElementById('custSearchInput').classList.add('d-none');
        document.getElementById('custResults').classList.add('d-none');
        document.getElementById('selectedCustomer').classList.remove('d-none');
        document.getElementById('displayCustName').innerText = name + (phone ? " (" + phone + ")" : "");
    };

    window.clearCustomer = () => {
        document.getElementById('custSearchInput').classList.remove('d-none');
        document.getElementById('custSearchInput').value = '';
        document.getElementById('selectedCustomer').classList.add('d-none');
        document.getElementById('displayCustName').innerText = '';
    };

    window.removeItem = (id) => { itemsList = itemsList.filter(i => i.id !== id); updateUI(); };

    window.updateUI = () => {
        const log = document.getElementById('mainLog');
        log.innerHTML = '';
        let total = 0;
        itemsList.forEach(i => {
            total += i.price;
            log.innerHTML += `
                <div class="log-item">
                    <div>
                        <span class="fw-bold small text-white">${i.name}</span>
                        <small class="item-time"><i class="far fa-calendar-alt me-1"></i>${i.time}</small>
                    </div>
                    <div class="text-end">
                        <div class="item-price">${i.price}</div>
                        <i class="fas fa-trash text-danger small mt-1" style="cursor:pointer" onclick="removeItem(${i.id})"></i>
                    </div>
                </div>`;
        });
        document.getElementById('totalVal').innerText = total;
        doCalc();
    };

    window.doCalc = () => {
        const total = parseFloat(document.getElementById('totalVal').innerText) || 0;
        const paid = parseFloat(document.getElementById('pAmount').value) || 0;
        document.getElementById('balVal').innerText = (total - paid).toFixed(2);
    };

    window.addManual = () => {
        const n = document.getElementById('mName').value;
        const p = parseFloat(document.getElementById('mPrice').value);
        if(n && p) {
            addItemToTable(n, p);
            document.getElementById('mName').value = '';
            document.getElementById('mPrice').value = '';
            closeAddModal();
        } else { alert("أدخل الاسم والسعر"); }
    };

    window.openAddModal = () => { new bootstrap.Modal(document.getElementById('addModal')).show(); };
    window.closeAddModal = () => {
        const modal = bootstrap.Modal.getInstance(document.getElementById('addModal'));
        if (modal) modal.hide();
        document.getElementById('pSearch').value = '';
        document.getElementById('pResults').classList.add('d-none');
    };

// استكمال الفاتورة لو جاية من السجل
    async function checkResume() {
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        if(editId) {
            const d = await getDoc(doc(db, "invoices", editId));
            if(d.exists()) {
                const data = d.data();
                selectCustomer(data.customer.name, data.customer.phone);
                itemsList = data.items || [];
                document.getElementById('pAmount').value = data.paid || 0;
                updateUI();
            }
        }
    }
    checkResume();
</script>

</body>
</html>
